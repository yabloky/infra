services:
  nezha:
    image: ghcr.io/yabloky/nezha:latest
    container_name: nezha
    restart: unless-stopped
    environment:
      - NZ_SITE_TITLE=Nezha Monitoring
      - NZ_LANGUAGE=en_US
      - NZ_PORT=8008
      - NZ_GRPC_PORT=5555
    ports:
      - "127.0.0.1:8008:8008"     # dashboard
      - "5555:5555/udp" # gRPC for agent
    volumes:
      - /opt/nezha/data:/data
